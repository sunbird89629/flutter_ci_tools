<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="flutter_ci_tools — Reusable CI tooling for Flutter apps. Pipeline, Action, Context.">
  <title>flutter_ci_tools</title>
  <desc>Hero image. Left: project name flutter_ci_tools, tagline reusable CI tooling for Flutter apps, and three stacked building blocks labeled Pipeline, Action, Context. Right: a compact terminal-style execution summary showing four actions — three succeeded and one failed.</desc>
  <style>
    .bg      { fill: #ffffff; }
    .fg      { fill: #1f2328; }
    .muted   { fill: #59636e; }
    .rule    { stroke: #d0d7de; stroke-width: 1; }
    .block   { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
    .block-p { stroke: #0969da; stroke-width: 1.5; fill: #ddf4ff; }
    .block-a { stroke: #8250df; stroke-width: 1.5; fill: #fbefff; }
    .block-c { stroke: #bf8700; stroke-width: 1.5; fill: #fff8c5; }
    .ok      { fill: #1a7f37; }
    .fail    { fill: #cf222e; }
    .accent  { fill: #0969da; }
    .brand   { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, Consolas, monospace; font-size: 44px; font-weight: 700; letter-spacing: -0.5px; }
    .tag     { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 20px; }
    .block-lbl { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; font-size: 18px; font-weight: 600; }
    .block-sub { font-family: -apple-system, system-ui, sans-serif; font-size: 13px; }
    .term-t  { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; font-size: 14px; font-weight: 600; }
    .term    { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace; font-size: 15px; }
    .caption { font-family: -apple-system, system-ui, sans-serif; font-size: 13px; }

    @media (prefers-color-scheme: dark) {
      .bg      { fill: #0d1117; }
      .fg      { fill: #e6edf3; }
      .muted   { fill: #7d8590; }
      .rule    { stroke: #30363d; }
      .block   { fill: #161b22; stroke: #30363d; }
      .block-p { stroke: #58a6ff; fill: #0c2d5c; }
      .block-a { stroke: #bc8cff; fill: #2e1a4d; }
      .block-c { stroke: #d29922; fill: #3d2e00; }
      .ok      { fill: #3fb950; }
      .fail    { fill: #f85149; }
      .accent  { fill: #58a6ff; }
    }
  </style>

  <rect class="bg" width="1200" height="480"/>

  <!-- ============ LEFT: name + tagline + three blocks ============ -->

  <!-- name -->
  <text class="brand fg" x="72" y="118">flutter_ci_tools</text>

  <!-- tagline -->
  <text class="tag muted" x="72" y="158">Reusable CI tooling for Flutter apps.</text>
  <text class="tag muted" x="72" y="184">Compose pipelines in Dart — the type checker is your linter.</text>

  <!-- three building blocks: Pipeline, Action, Context -->
  <g>
    <rect class="block-p" x="72"  y="240" width="160" height="80" rx="8"/>
    <text class="block-lbl fg"    x="152" y="278" text-anchor="middle">Pipeline</text>
    <text class="block-sub muted" x="152" y="300" text-anchor="middle">before → body → after</text>

    <rect class="block-a" x="252" y="240" width="160" height="80" rx="8"/>
    <text class="block-lbl fg"    x="332" y="278" text-anchor="middle">Action</text>
    <text class="block-sub muted" x="332" y="300" text-anchor="middle">typed · timed · tracked</text>

    <rect class="block-c" x="432" y="240" width="160" height="80" rx="8"/>
    <text class="block-lbl fg"    x="512" y="278" text-anchor="middle">Context</text>
    <text class="block-sub muted" x="512" y="300" text-anchor="middle">shared config &amp; state</text>
  </g>

  <!-- caption under blocks -->
  <text class="caption muted" x="72" y="360">Three building blocks. Nothing else to learn.</text>

  <!-- footer meta -->
  <text class="caption muted" x="72" y="420">MIT · Dart 3 · Android · iOS · Pgyer · Feishu · Google Play · App Store</text>

  <!-- vertical divider -->
  <line class="rule" x1="672" y1="72" x2="672" y2="408"/>

  <!-- ============ RIGHT: proof — compact execution summary ============ -->

  <g transform="translate(712, 84)">
    <rect class="block" x="0" y="0" width="416" height="316" rx="10"/>

    <!-- window dots -->
    <circle cx="20" cy="22" r="5" fill="#cf222e"/>
    <circle cx="38" cy="22" r="5" fill="#bf8700"/>
    <circle cx="56" cy="22" r="5" fill="#1a7f37"/>
    <text class="term-t muted" x="208" y="27" text-anchor="middle">dart run ci/build.dart test</text>

    <line class="rule" x1="16" y1="46" x2="400" y2="46"/>
    <text class="term-t fg" x="208" y="72" text-anchor="middle">执行摘要</text>
    <line class="rule" x1="16" y1="86" x2="400" y2="86"/>

    <!-- rows -->
    <text class="term ok"     x="20"  y="120">✅</text>
    <text class="term fg"     x="46"  y="120">ResolveBuildVersionAction</text>
    <text class="term accent" x="392" y="120" text-anchor="end">12ms</text>

    <text class="term ok"     x="20"  y="152">✅</text>
    <text class="term fg"     x="46"  y="152">CleanProjectAction</text>
    <text class="term accent" x="392" y="152" text-anchor="end">3.1s</text>

    <text class="term ok"     x="20"  y="184">✅</text>
    <text class="term fg"     x="46"  y="184">BuildAndroidAction</text>
    <text class="term accent" x="392" y="184" text-anchor="end">47.2s</text>

    <text class="term fail"   x="20"  y="216">❌</text>
    <text class="term fg"     x="46"  y="216">PgyerUploadAction</text>
    <text class="term accent" x="392" y="216" text-anchor="end">1.8s</text>

    <line class="rule" x1="16" y1="240" x2="400" y2="240"/>
    <text class="caption muted" x="208" y="272" text-anchor="middle">status · duration · error captured</text>
    <text class="caption muted" x="208" y="292" text-anchor="middle">for every runAction() call</text>
  </g>
</svg>
