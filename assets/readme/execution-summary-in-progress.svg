<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Execution summary in progress: 2 succeeded, 1 running, 2 pending">
  <title>flutter_ci_tools execution summary (running)</title>
  <desc>In-progress terminal-style summary: ResolveBuildVersionAction and CleanProjectAction have succeeded; BuildAndroidAction is running; PgyerUploadAction and PushBuildTagAction are pending.</desc>
  <style>
    .bg      { fill: #ffffff; }
    .panel   { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
    .fg      { fill: #1f2328; }
    .muted   { fill: #59636e; }
    .rule    { stroke: #d0d7de; stroke-width: 1; }
    .ok      { fill: #1a7f37; }
    .running { fill: #9a6700; }
    .pending { fill: #59636e; }
    .accent  { fill: #0969da; }
    .mono    { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, Consolas, monospace; font-size: 20px; }
    .head    { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, Consolas, monospace; font-size: 22px; font-weight: 600; }
    .dim     { opacity: 0.55; }
    @media (prefers-color-scheme: dark) {
      .bg      { fill: #0d1117; }
      .panel   { fill: #161b22; stroke: #30363d; }
      .fg      { fill: #e6edf3; }
      .muted   { fill: #7d8590; }
      .rule    { stroke: #30363d; }
      .ok      { fill: #3fb950; }
      .running { fill: #d29922; }
      .pending { fill: #7d8590; }
      .accent  { fill: #58a6ff; }
    }
  </style>

  <rect class="bg" width="1200" height="360"/>
  <rect class="panel" x="40" y="30" width="1120" height="300" rx="10"/>

