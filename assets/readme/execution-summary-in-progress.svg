  <text class="mono muted dim"   x="1112" y="268" text-anchor="end">pending</text>

  <line class="rule" x1="72" y1="292" x2="1128" y2="292"/>

  <text class="mono muted" x="600" y="345" text-anchor="middle">status tracked live via pipeline.executedActions</text>
